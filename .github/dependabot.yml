# Dependabot version updates. Keeps every dependency ecosystem in the repo current.
# Security updates are enabled separately in repo Settings → Code security; the weekly
# version-update sweep below also picks up fixed advisories as they ship.
#
# Noise control: minor + patch bumps are grouped into one PR per ecosystem; major
# versions open individual PRs — EXCEPT for peer-locked families where a lone bump
# would leave an unsatisfiable peer range. Those families travel together as one major PR.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # .NET — host + module projects + tests. NuGet discovery walks the repo from root and
  # finds every *.csproj referenced by LeaseBook.slnx (src/ and tests/).
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "build(deps)"
    groups:
      dotnet-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # React + TypeScript SPA (package.json / package-lock.json live in web/).
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "daily"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "build(deps)"
    groups:
      # --- Peer-locked families — majors only. All minor/patch bumps land in the
      #     catch-all group at the bottom. ---

      # react + react-dom ship at identical versions and must match at runtime;
      # the @types/* packages track the same major.
      react:
        applies-to: version-updates
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "major"

      # @tanstack/react-query, -devtools, and react-virtual all require a compatible
      # @tanstack core — major bumps typically ship across the family at once.
      tanstack:
        applies-to: version-updates
        patterns:
          - "@tanstack/*"
        update-types:
          - "major"

      # @vitejs/plugin-react requires a matching Vite major; vitest and @vitest/*
      # track the Vite majors they support.
      vite-ecosystem:
        applies-to: version-updates
        patterns:
          - "vite"
          - "vitest"
          - "@vitejs/plugin-react"
          - "@vitest/*"
        update-types:
          - "major"

      # @testing-library/react and user-event both peer-require @testing-library/dom.
      testing-library:
        applies-to: version-updates
        patterns:
          - "@testing-library/*"
        update-types:
          - "major"

      # @eslint/js is lockstep-versioned with eslint; plugins peer-cap on the eslint
      # major; typescript-eslint peer-bounds both eslint and typescript.
      lint-and-typescript:
        applies-to: version-updates
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
          - "eslint-config-*"
          - "typescript-eslint"
          - "globals"
          - "typescript"
        update-types:
          - "major"

      npm-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # TypeScript majors are held until the SPA toolchain can accept them. TS 6 (was PR #9) is
    # blocked by openapi-typescript's `typescript: "^5.x"` peer — no published release admits
    # TS 6, and forcing it would mean an unsafe `--legacy-peer-deps` resolve. This ignore is
    # open-ended, so the ts6-unblock-watch workflow opens a tracking issue when openapi-typescript
    # relaxes that peer; remove this entry then and let Dependabot re-propose the major.
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"

  # Base images in the production Dockerfile (FROM lines).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(deps)"
    groups:
      docker-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # Service images in docker-compose.yml (postgres, pgadmin). Separate ecosystem from
  # "docker" since GA in Feb 2025.
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker-compose"
    commit-message:
      prefix: "build(deps)"
    groups:
      compose-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # Action versions pinned in .github/workflows/*.yml (ci, deploy-dev, deploy-prod).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
