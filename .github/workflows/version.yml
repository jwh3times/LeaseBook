name: Version

# Stamps every merge to main with an auto-incrementing SemVer build number.
#
# The root VERSION file is the requested version line in <major>.<minor>.<build> form.
# The first merge for a new major/minor line uses VERSION exactly, so bumping VERSION
# to 1.2.0 creates v1.2.0 when no v1.2.0 tag exists. Later merges on the same line
# increment the third component: v1.2.1, v1.2.2, and so on.
#
# Why tags/releases instead of committing a bump back to main:
#   - it works identically on protected branches (no bypass actor or bump-commit needed);
#   - it never re-triggers CI or needs [skip ci] loops;
#   - major/minor bumps can start at build 0, while repeated merges auto-increment.
#
# To see which build a checkout corresponds to: git describe --tags

on:
  push:
    branches: [main]

permissions:
  contents: write # required to push the build tag and create the GitHub Release

# Serialize runs so two closely-spaced merges can't compute the same build number.
concurrency:
  group: version-main
  cancel-in-progress: false

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags, needed to compute the next build number

      - name: Compute SemVer build tag
        id: version
        shell: bash
        run: |
          version=$(tr -d '[:space:]' < VERSION)
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error file=VERSION::Version '$version' must be a plain SemVer value in <major>.<minor>.<build> format with no leading zeroes."
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          requested_build="${BASH_REMATCH[3]}"
          prefix="v${major}.${minor}."

          # Idempotency for workflow reruns: if this commit already has a release tag
          # for the requested major/minor line, reuse it instead of minting another build.
          current_build=$(
            git tag --points-at "$GITHUB_SHA" --list "${prefix}*" |
              awk -v prefix="$prefix" 'index($0, prefix) == 1 { print substr($0, length(prefix) + 1) }' |
              grep -E '^(0|[1-9][0-9]*)$' |
              sort -n |
              tail -1 || true
          )

          if [[ -n "$current_build" ]]; then
            build="$current_build"
          else
            last_build=$(
              git tag --list "${prefix}*" |
                awk -v prefix="$prefix" 'index($0, prefix) == 1 { print substr($0, length(prefix) + 1) }' |
                grep -E '^(0|[1-9][0-9]*)$' |
                sort -n |
                tail -1 || true
            )

            if [[ -z "$last_build" ]]; then
              build="$requested_build"
            elif (( requested_build > last_build )); then
              build="$requested_build"
            else
              build=$((last_build + 1))
            fi
          fi

          tag="${prefix}${build}"

          {
            echo "tag=${tag}"
            echo "version=${major}.${minor}.${build}"
            echo "major_minor=${major}.${minor}"
            echo "build=${build}"
            if [[ -n "$current_build" ]]; then
              echo "tag_exists=true"
            else
              echo "tag_exists=false"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Push tag
        if: steps.version.outputs.tag_exists != 'true'
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "LeaseBook ${version}"
          git push origin "refs/tags/${tag}"

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release ${tag} already exists."
          else
            gh release create "$tag" \
              --title "LeaseBook ${version}" \
              --generate-notes
          fi

      - name: Summarize release
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"
          major_minor="${{ steps.version.outputs.major_minor }}"
          build="${{ steps.version.outputs.build }}"

          {
            echo "### Release stamped: \`${tag}\`"
            echo ""
            echo "- Version: \`${version}\`"
            echo "- Major/minor line: \`${major_minor}\`"
            echo "- Build number: \`${build}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Release: \`${tag}\`"
          } >> "$GITHUB_STEP_SUMMARY"
