name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege default for every job's GITHUB_TOKEN: these jobs only read the repo
# (build/test/lint, apply migrations to a throwaway DB, scan for secrets, build the image —
# none push or write any GitHub resource). Grant more per-job only if a job starts needing it.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR). A cancelled main run
# never triggers deploy-dev (its workflow_run gate requires conclusion == success); the
# superseding run deploys instead.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      # Generated EF migrations are excluded from the format gate (the ef generator owns their style).
      - run: dotnet format --verify-no-changes --exclude src/LeaseBook.Web/Migrations
      - run: dotnet build -c Release --no-restore
      # Runs unit, architecture, and Testcontainers-backed integration tests (Docker is on the runner).
      # The schema guard + tenant-isolation pack run here against a fresh Postgres 18 container.
      - run: dotnet test -c Release --no-build

  web:
    name: Web (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # `.codex/agents/*.toml` and `.agents/skills/` are generated from `.claude/`. Regenerating
      # here and failing on any difference is what keeps the harness copies from drifting apart —
      # editing an agent contract without re-running the sync is caught before merge.
      - name: Verify committed harness mirrors are up to date
        working-directory: ${{ github.workspace }}
        run: node scripts/sync-agent-mirrors.mjs --check
      # Public docs are formatted, structurally linted, spell-checked, and validated against the
      # repository's metadata, ADR-index, canonical-ownership, and private-link policies.
      - run: npm run docs:check
      # Formatting gate: fails if anything under web/ wasn't run through Prettier (mirrors the
      # backend's `dotnet format` check). Run `npm run format` to fix locally.
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  schema-drift:
    name: API client matches OpenAPI contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@v7
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: web/package-lock.json
      # Emit the OpenAPI v1 document at build time — no running host, no database (ADR-012). The
      # LEASEBOOK_OPENAPI_BUILD flag skips the startup role-seeding DB call the GetDocument tool
      # would otherwise run; generation is off in every other build, so only this job emits the doc.
      - name: Generate the OpenAPI document from the backend
        run: dotnet build src/LeaseBook.Web/LeaseBook.Web.csproj -c Debug -p:OpenApiGenerateDocumentsOnBuild=true
        env:
          LEASEBOOK_OPENAPI_BUILD: '1'
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      # Regenerate the typed client from the freshly built contract and fail if it differs from the
      # committed copy — i.e. the API surface changed without `npm run api:generate` being re-run.
      # --alphabetize makes the output canonical so endpoint ordering never causes false drift.
      - name: Verify committed API client is up to date
        working-directory: web
        run: |
          npx openapi-typescript ../src/LeaseBook.Web/obj/openapi/LeaseBook.Web.json --alphabetize -o src/api/schema.d.ts
          if ! git diff --exit-code -- src/api/schema.d.ts; then
            echo "::error file=web/src/api/schema.d.ts::API client is stale. Run 'npm run api:generate' against the host and commit web/src/api/schema.d.ts."
            exit 1
          fi

  migration-check:
    name: Migrations apply to a blank DB
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: dev_postgres_pw
          POSTGRES_DB: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s --health-timeout 5s --health-retries 12
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
      - name: Create database + roles (bootstrap.sql)
        run: psql "host=localhost port=5432 user=postgres dbname=postgres" -v ON_ERROR_STOP=1 -f infra/db/bootstrap.sql
        env:
          PGPASSWORD: dev_postgres_pw
      - run: dotnet tool restore
      # dotnet ef builds LeaseBook.Web before applying migrations; restore its packages first so
      # project.assets.json exists (the design-time build does not restore on its own).
      - run: dotnet restore src/LeaseBook.Web
      - name: Apply migrations as the migrator role
        run: dotnet ef database update --project src/LeaseBook.Web
        env:
          ConnectionStrings__Migrations: Host=localhost;Port=5432;Database=leasebook;Username=leasebook_migrator;Password=dev_migrator_pw

  e2e:
    name: E2E (Playwright + a11y)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: dev_postgres_pw
          POSTGRES_DB: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      ASPNETCORE_ENVIRONMENT: Development
      # App-role connection string → the service container (port 5432, NOT the dev 5632). Used by the
      # seed steps and forwarded into the Playwright-started host via playwright.config.ts.
      ConnectionStrings__Default: Host=localhost;Port=5432;Database=leasebook;Username=leasebook_app;Password=dev_app_pw
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@v7
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Create database + roles (bootstrap.sql)
        run: psql "host=localhost port=5432 user=postgres dbname=postgres" -v ON_ERROR_STOP=1 -f infra/db/bootstrap.sql
        env:
          PGPASSWORD: dev_postgres_pw
      - run: dotnet tool restore
      - run: dotnet restore src/LeaseBook.Web
      - name: Apply migrations as the migrator role
        run: dotnet ef database update --project src/LeaseBook.Web
        env:
          ConnectionStrings__Migrations: Host=localhost;Port=5432;Database=leasebook;Username=leasebook_migrator;Password=dev_migrator_pw
      - name: Seed demo + cutover orgs (app role)
        run: |
          dotnet run --project src/LeaseBook.Web -- seed --org demo
          dotnet run --project src/LeaseBook.Web -- seed --org cutover
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run e2e (Playwright suite incl. a11y)
        working-directory: web
        run: npm run e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Builds the container images *and* proves they actually run. This replaces a build-only job that
  # verified the image compiled but never started it — the gap that let a startup-guard
  # misconfiguration put `app` into a silent restart loop while every check stayed green.
  #
  # Bringing up the Compose `full` profile subsumes the old build check and widens it:
  #   - `runtime` is the Dockerfile's last stage, so Compose builds exactly what the build-only job
  #     built (pushing the image is deploy-dev's job, and is exercised separately on main).
  #   - it additionally builds the `migrator` target, which no CI job built before.
  #   - it then runs the documented local stack end to end (`./scripts/dev.ps1 app-up`):
  #     db healthy → migrate completes → seed completes → app serves.
  container:
    name: Container build + full-stack smoke
    runs-on: ubuntu-latest
    env:
      # Host port the `app` service publishes; the container always listens on 8080. Matches the
      # README port map's default so CI exercises the same mapping a developer gets.
      LEASEBOOK_APP_PORT: 8082
    steps:
      - uses: actions/checkout@v7

      # Builds db/migrate/seed/app and runs the depends_on chain: db healthy → migrate completes →
      # seed completes → app starts. A non-zero exit here means the chain itself broke.
      - name: Bring up the full profile
        run: docker compose --profile full up -d --build

      # Poll from the runner rather than adding a container HEALTHCHECK: the runtime image is not
      # guaranteed to carry curl/wget, and the runner always does. Fails fast with logs if the
      # container exits or starts flapping instead of waiting out the full timeout.
      - name: Wait for /api/health to serve
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if curl -fsS "http://localhost:${LEASEBOOK_APP_PORT}/api/health" -o /tmp/health.json; then
              echo "Healthy after ~$((attempt * 2))s: $(cat /tmp/health.json)"
              exit 0
            fi
            status="$(docker inspect -f '{{.State.Status}}' leasebook-app 2>/dev/null || echo missing)"
            if [ "$status" = "exited" ] || [ "$status" = "missing" ]; then
              echo "::error::leasebook-app is '$status' — it never came up."
              exit 1
            fi
            # A crash loop reports 'restarting', not 'exited', so a status check alone would wait out
            # the whole timeout and report a vague failure. Any restart before the first healthy
            # response is already the bug — fail immediately with the real reason.
            if [ "$(docker inspect -f '{{.RestartCount}}' leasebook-app)" -ne 0 ]; then
              echo "::error::leasebook-app is crash-looping (status '$status'). It died before serving."
              exit 1
            fi
            sleep 2
          done
          echo "::error::Timed out after 120s waiting for /api/health."
          exit 1

      # The regression that motivated this job was a *restart loop*, not a hard failure: with
      # `restart: unless-stopped` the container kept dying and coming back. A healthy response alone
      # would not have caught it, so assert the app reached ready state without ever restarting.
      - name: Assert the app did not crash-loop on the way up
        run: |
          set -euo pipefail
          restarts="$(docker inspect -f '{{.RestartCount}}' leasebook-app)"
          echo "RestartCount=$restarts"
          if [ "$restarts" -ne 0 ]; then
            echo "::error::leasebook-app restarted $restarts time(s) before serving — it is crash-looping."
            exit 1
          fi

      # The image serves the built SPA and the API from one origin; a 200 here proves the published
      # port reaches the app and the web assets made it into the runtime layer.
      - name: Assert the SPA is served
        run: |
          set -euo pipefail
          code="$(curl -fsS -o /dev/null -w '%{http_code}' "http://localhost:${LEASEBOOK_APP_PORT}/")"
          echo "SPA root returned HTTP $code"

      - name: Dump Compose logs on failure
        if: failure()
        run: docker compose --profile full logs --no-color --tail 200

      - name: Tear down
        if: always()
        run: docker compose --profile full down -v --remove-orphans
