name: Feature request
description: Suggest an enhancement or new capability for LeaseBook
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. LeaseBook holds a deliberately narrow scope — small residential property
        management, correctness first. Proposals outside it (HOA, commercial, short-term rentals,
        native mobile, full GL bookkeeping, and the other PRD exclusions) are declined on sight through
        the current phase. Please skim the scope-discipline notes in
        [CONTRIBUTING.md](../CONTRIBUTING.md) before filing.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I have read the scope-discipline section of CONTRIBUTING.md
          required: false
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve, and for whom? Describe the situation you're trying to improve, not just the feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to happen. Be concrete about the behavior or workflow.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you weighed, and why they fall short.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, related ADRs, or anything else that helps.
    validations:
      required: false
