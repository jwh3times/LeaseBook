# Local development infrastructure. DEV ONLY — real environments use Azure Database for
# PostgreSQL Flexible Server with managed identity / Key Vault (see infra/, WP-10).
#
# Two ways to run, by profile:
#   docker compose up -d                     → just Postgres (inner-loop dev: `dotnet run` + Vite on
#                                              the host hit this db). This is `./scripts/dev.ps1 up`.
#   docker compose --profile full up -d --build
#                                            → the whole product in containers (db → migrate → seed →
#                                              app on :8080). This is `./scripts/dev.ps1 app-up`.
#
# `migrate` and `seed` are one-shot containers: they run to completion and exit 0 (you'll see them as
# "Exited (0)" in Docker Desktop — that's success, not a crash). The chain is enforced by depends_on:
#   db healthy → migrate (migrator role, applies the schema) → seed (app role, demo org) → app serves.

# Connection strings are assembled here, not baked into images, so credentials stay in this dev file.
x-app-conn: &app-conn "Host=db;Port=5432;Database=leasebook;Username=leasebook_app;Password=dev_app_pw"
x-migrator-conn: &migrator-conn "Host=db;Port=5432;Database=leasebook;Username=leasebook_migrator;Password=dev_migrator_pw"

# Both the seed one-shot and the long-running app are the same image, built once from the runtime target.
x-app-build: &app-build
  context: .
  target: runtime

services:
  db:
    image: postgres:18
    container_name: leasebook-db
    environment:
      # Superuser password (dev-only). The three application roles are created by bootstrap.sql.
      POSTGRES_PASSWORD: dev_postgres_pw
      POSTGRES_DB: postgres
    ports:
      # Host port defaults to 5632 — offset from the canonical 5432 so its Postgres
      # coexists with other local projects. Override with LEASEBOOK_DB_PORT. The
      # container always listens on 5432, and the inner-loop connection string in
      # appsettings.Development.json points at this same host port.
      - "${LEASEBOOK_DB_PORT:-5632}:5432"
    volumes:
      # postgres:18+ images put PGDATA at /var/lib/postgresql/<major>/docker and declare the
      # volume one level up (enables pg_upgrade --link across majors). Mounting the pre-18
      # path /var/lib/postgresql/data would be silently ignored — data would not persist.
      - leasebook-pgdata:/var/lib/postgresql
      # Runs once on first init (empty data dir): creates the leasebook DB, the three roles,
      # and default privileges. `reset-db` wipes the volume so this re-runs from scratch.
      - ./infra/db/bootstrap.sql:/docker-entrypoint-initdb.d/01-bootstrap.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot: brings the schema to the latest migration as the migrator role, then exits.
  migrate:
    profiles: ["full"]
    build:
      context: .
      target: migrator
    image: leasebook-migrator
    container_name: leasebook-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      # The EF bundle's design-time factory reads this (ConnectionStrings:Migrations).
      ConnectionStrings__Migrations: *migrator-conn
    restart: "no"

  # One-shot: provisions the demo org (Tarheel Property Group) + admin as the app role. Idempotent —
  # safe to re-run, so it executes on every `up` and simply skips when the org already exists.
  seed:
    profiles: ["full"]
    build: *app-build
    image: leasebook
    container_name: leasebook-seed
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__Default: *app-conn
    # ENTRYPOINT is `dotnet LeaseBook.Web.dll`; this runs the `seed` verb and exits instead of serving.
    command: ["seed", "--org", "demo"]
    restart: "no"

  # The application: SPA + API on :8080, connecting as the RLS-subject app role.
  app:
    profiles: ["full"]
    build: *app-build
    image: leasebook
    container_name: leasebook-app
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__Default: *app-conn
    ports:
      # Browse http://localhost:8082 once healthy (host port offset from the default;
      # the container always listens on 8080 and the Azure image is unchanged).
      # Override with LEASEBOOK_APP_PORT.
      - "${LEASEBOOK_APP_PORT:-8082}:8080"
    restart: unless-stopped

  # pgAdmin for browsing the local db (inner-loop or full stack). Connects to the
  # `db` service internally on 5432; the host port (5250) is offset from the default.
  # No profile, so it comes up with a plain `docker compose up` alongside `db`.
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: leasebook-pgadmin
    environment:
      # Use a real TLD: pgAdmin's email validator rejects reserved/special-use domains
      # like .local (GLOBALLY_DELIVERABLE), which crash-loops the container on startup.
      PGADMIN_DEFAULT_EMAIL: ${LEASEBOOK_PGADMIN_EMAIL:-admin@leasebook.com}
      PGADMIN_DEFAULT_PASSWORD: ${LEASEBOOK_PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${LEASEBOOK_PGADMIN_PORT:-5250}:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  leasebook-pgdata:
